name: Technical improvement
description: Propose an architecture, performance, reliability, or maintainability improvement
title: "[Technical]: "
labels:
  - technical-improvement
  - needs-triage
body:
  - type: dropdown
    id: category
    attributes:
      label: Improvement category
      options:
        - Architecture
        - Performance
        - Reliability
        - Security
        - Privacy
        - Testing
        - Observability
        - Database
        - CI/CD
        - Developer experience
        - Dependency maintenance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: current-problem
    attributes:
      label: Current problem
      description: Describe the technical limitation, risk, or recurring cost.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include measurements, logs, code references, incidents, or examples supporting the proposal.
      placeholder: |
        Relevant files:
        Measurements:
        Failure examples:
        Related issues:
    validations:
      required: true

  - type: textarea
    id: proposed-approach
    attributes:
      label: Proposed approach
      description: Describe the recommended technical direction.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain other approaches and why they may be less suitable.

  - type: textarea
    id: risks
    attributes:
      label: Risks and trade-offs
      description: Consider compatibility, migrations, operational risk, security, and maintenance cost.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Tests cover...
        - [ ] Performance changes are measured...
        - [ ] Migration and rollback are documented...
        - [ ] Existing behavior remains compatible...
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: This proposal is scoped around a specific technical problem.
          required: true
        - label: I removed secrets and personal data from all examples.
          required: true
        - label: I agree to follow the project Code of Conduct.
          required: true
