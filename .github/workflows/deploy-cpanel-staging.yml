# Build the frontend and upload to cPanel staging (dev-jobs.sync.ngo).
#
# Trigger: push to `dev` (merge feature PRs into dev before main/prod).
#
# Required GitHub repository secrets (STG_ prefix — separate from production):
#   STG_VITE_SUPABASE_URL
#   STG_VITE_SUPABASE_ANON_KEY
#   STG_CPANEL_FTP_SERVER
#   STG_CPANEL_FTP_USERNAME
#   STG_CPANEL_FTP_PASSWORD
# Optional:
#   STG_VITE_API_BASE_URL
#   STG_VITE_SITE_URL          (default https://dev-jobs.sync.ngo)
#   STG_CPANEL_FTP_SERVER_DIR  (default ./ — FTP login root for dev-jobs site)
#
# See docs/staging-environment.md

name: Deploy frontend to cPanel (staging)

on:
  workflow_dispatch:
    inputs:
      skip_upload:
        description: Build only (do not upload to cPanel)
        type: boolean
        default: false
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-cpanel-staging.yml"

concurrency:
  group: deploy-cpanel-staging-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy (staging)
    environment: staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_SUPABASE_URL: ${{ secrets.STG_VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.STG_VITE_SUPABASE_ANON_KEY }}
      VITE_API_BASE_URL: ${{ secrets.STG_VITE_API_BASE_URL }}
      VITE_SITE_URL: ${{ secrets.STG_VITE_SITE_URL }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate staging secrets
        working-directory: .
        env:
          SKIP_UPLOAD: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_upload }}
          STG_CPANEL_FTP_SERVER: ${{ secrets.STG_CPANEL_FTP_SERVER }}
          STG_CPANEL_FTP_USERNAME: ${{ secrets.STG_CPANEL_FTP_USERNAME }}
          STG_CPANEL_FTP_PASSWORD: ${{ secrets.STG_CPANEL_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("STG_${name}")
            fi
          done
          if [ "${SKIP_UPLOAD}" != "true" ]; then
            for name in STG_CPANEL_FTP_SERVER STG_CPANEL_FTP_USERNAME STG_CPANEL_FTP_PASSWORD; do
              if [ -z "${!name:-}" ]; then
                missing+=("$name")
              fi
            done
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}"
            printf 'Add them under Settings → Secrets and variables → Actions.\n'
            printf 'See docs/staging-environment.md\n'
            exit 1
          fi

      - name: Resolve staging VITE_API_BASE_URL
        if: env.VITE_API_BASE_URL == ''
        run: |
          base="${VITE_SUPABASE_URL%/}"
          echo "VITE_API_BASE_URL=${base}/functions/v1" >> "$GITHUB_ENV"

      - name: Resolve staging VITE_SITE_URL
        if: env.VITE_SITE_URL == ''
        run: echo "VITE_SITE_URL=https://dev-jobs.sync.ngo" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build staging bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-staging-${{ github.sha }}
          path: frontend/dist/
          retention-days: 14

      - name: Deploy to cPanel staging (FTPS)
        if: ${{ ! (github.event_name == 'workflow_dispatch' && inputs.skip_upload) }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.STG_CPANEL_FTP_SERVER }}
          username: ${{ secrets.STG_CPANEL_FTP_USERNAME }}
          password: ${{ secrets.STG_CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./frontend/dist/
          server-dir: ${{ secrets.STG_CPANEL_FTP_SERVER_DIR || './' }}
          dangerous-clean-slate: false
          exclude: |
            **/.ftp-deploy-sync-state.json
            **/.ftp-deploy-sync-state.json.tmp
