project_id = "cv-intelligence-platform"

[api]
enabled = true
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
major_version = 17

[auth]
enabled = true

# Analytics (Logflare) needs the Docker daemon exposed on tcp://localhost:2375 on
# Windows, which is off by default. The app does not need analytics locally.
[analytics]
enabled = false

[functions.search]
verify_jwt = true

[functions.search-debug]
verify_jwt = true

[functions.platform]
verify_jwt = true

[functions.public-jobs]
verify_jwt = false

[functions.compare]
verify_jwt = true

[functions.rank]
verify_jwt = true

[functions.ask]
verify_jwt = true

[functions.agent]
verify_jwt = true

[functions.manatal-webhook]
verify_jwt = false
